<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WarmLife - Login</title>
    <link rel="stylesheet" href="LoginEdit.css">
</head>
<body>
    <div class="login-container">

        <div class="logo">
            <img src="https://cdn-icons-png.flaticon.com/512/2864/2864348.png" alt="logo" width="50">
            <h2>Warm <span>Life</span></h2>
        </div>
        <p class="welcome-text">Bienvenido al Panel de Cancerología</p>

        <form action="Gestion.html">
            <div class="input-group">
                <input type="text" name="usuario" placeholder="Usuario Institucional" required>
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Contraseña" required>
            </div>
            <button type="submit" class="btn-login">Acceder al Sistema →</button>
        </form>

        <div class="footer-links">
            <a href="#">¿Olvidaste tu acceso?</a>
            <p>© 2026 MedSync Health Solutions</p>
        </div>
    </div>
</body>
</html>
